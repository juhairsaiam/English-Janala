     <head>

<!-- banner section -->
 <section class="flex flex-col-reverse sm:flex-row items-center mx-4 md:mx-24">
    <div class="flex-1">

        <p class="text-lg">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>
        <input class="block border-gray-300 p-1" type="text" name="" id="" placeholder="Enter Your Email">
        <input class="block my-3 border-gray-300 p-1" type="password" name="" id="" placeholder="Password">
        <button
        class="btn btn-primary">Get Started</button>
    </div>
    <div class="flex-1"><img src="assets/hero-student.png" alt=""></div>
 </section>

 <!-- lesson section -->
 <section class="mt-16">

    <div id="lessonDiv" class="flex gap-2 justify-center flex-wrap mt-8">
 </div>
 </section>

 <section id="spinner" class="flex justify-center items-center py-10 hidden"><span class="loading loading-dots loading-xl"></span>

<section class="flex justify-center items-center mt-8">

</div>
</section>

 <section id="wordsDiv"class="w-11/12 p-10 bg-[#F8F8F8] mx-auto my-10 grid grid-cols-1 md:grid-cols-3 gap-7 ">

 </section>
